name: Monthly Refresh

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install wpscan
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential libcurl4-openssl-dev libxml2 libxml2-dev libxslt1-dev zlib1g-dev
          sudo gem install wpscan --no-document
        continue-on-error: true

      - name: Refresh active sites
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, datetime

          index_file = 'web/data/index.json'
          now        = datetime.datetime.utcnow()
          cutoff     = now - datetime.timedelta(days=90)
          nowstr     = now.strftime('%Y-%m-%dT%H:%M:%SZ')

          with open(index_file) as f:
              index = json.load(f)

          active, stale = 0, 0
          for entry in index.get('sites', []):
              domain = entry['d']
              url    = entry.get('url', 'https://' + domain)
              last   = entry.get('last_refreshed', entry.get('scanned_at', ''))
              try:
                  last_dt = datetime.datetime.strptime(last[:19], '%Y-%m-%dT%H:%M:%S')
              except:
                  stale += 1; continue

              if last_dt < cutoff:
                  stale += 1
                  print(f'[SKIP] {domain} — over 90 days')
                  continue

              site_file = f'web/data/sites/{domain}.json'
              print(f'[RUN] {domain}')
              r = subprocess.run(
                  ['python3', 'wpscan-recon.py', '-u', url, '-o', site_file, '--no-cache'],
                  capture_output=True, text=True
              )
              if r.returncode != 0:
                  print(f'[WARN] {domain}: {r.stderr[:200]}')
                  continue

              with open(site_file) as f:
                  data = json.load(f)
              data['display_name']   = entry.get('display_name', '')
              data['display_loc']    = entry.get('display_loc', '')
              data['last_refreshed'] = nowstr
              with open(site_file, 'w') as f:
                  json.dump(data, f, indent=2)

              entry.update({
                  'wp_version':        data.get('wp_version', ''),
                  'wp_version_status': data.get('wp_version_status', 'unknown'),
                  'vuln_count':        data.get('vuln_count', 0),
                  'plugin_count':      data.get('plugin_count', 0),
                  'user_count':        data.get('user_count', 0),
                  'xmlrpc_active':     bool(data.get('xmlrpc_active')),
                  'readme_exposed':    bool(data.get('readme_exposed')),
                  'method':            data.get('method', 'wpscan'),
                  'last_refreshed':    nowstr,
              })
              active += 1

          index['sites'] = sorted(index['sites'], key=lambda s: -(s.get('vuln_count', 0)))
          with open(index_file, 'w') as f:
              json.dump(index, f, indent=2)
          print(f'[DONE] refreshed={active} skipped={stale}')
          PYEOF

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/
          git diff --cached --quiet || git commit -m "data: monthly refresh [skip ci]"
          git push
