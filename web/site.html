<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Detail — WPSCAN-RECON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">WPSCAN-RECON</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="wp-board.html">WordPress Board</a>
    <a href="https://github.com/fmfalgun/wpscan-recon" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
    <a href="https://fmfalgun.github.io" target="_blank" rel="noopener noreferrer">Portfolio ↗</a>
  </div>
</nav>

<div class="site-header">
  <span class="site-url-display" id="site-url-display">—</span>
  <span class="site-contributor" id="contributor-meta"></span>
</div>

<section id="stats-row" class="stats-row">
  <div class="stat-badge">
    <span class="stat-value" id="val-wp-version">—</span>
    <span class="stat-label">WordPress</span>
  </div>
  <div class="stat-badge">
    <span class="stat-value" id="val-vuln-count">—</span>
    <span class="stat-label">Vulns</span>
  </div>
  <div class="stat-badge">
    <span class="stat-value" id="val-plugin-count">—</span>
    <span class="stat-label">Plugins</span>
  </div>
  <div class="stat-badge">
    <span class="stat-value" id="val-user-count">—</span>
    <span class="stat-label">Users Found</span>
  </div>
</section>

<main>
  <p id="scanned-at-line">data as of <span id="scanned-at">—</span></p>

  <!-- Exposure Summary -->
  <div class="section" id="section-exposure">
    <h2 class="section-title">Exposure Summary</h2>
    <div id="exposure-grid"></div>
  </div>

  <!-- Interesting Findings -->
  <div class="section" id="section-findings">
    <h2 class="section-title">Interesting Findings</h2>
    <div class="findings-list" id="findings-list"></div>
  </div>

  <!-- Plugins -->
  <div class="section" id="section-plugins">
    <h2 class="section-title">Plugins</h2>
    <div id="plugins-container"></div>
  </div>

  <!-- Users -->
  <div class="section" id="section-users">
    <h2 class="section-title">Enumerated Users</h2>
    <div class="users-list" id="users-list"></div>
  </div>

  <div id="error-box" style="display:none"><span id="error-message"></span></div>
</main>

<footer class="site-footer">
  <a href="wp-board.html">← WordPress Board</a>
  &nbsp;·&nbsp; wpscan-recon &nbsp;·&nbsp;
  <a href="https://github.com/fmfalgun/wpscan-recon" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
</footer>

<script src="assets/js/site.js"></script>
</body>
</html>
